name: etl pipeline
on:
    push:
        branches:
            - main
jobs:
    extract-data-job:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v2
            - name: Run extract_data.py
              run: python extract_data.py

    transform-data-job:
        runs-on: ubuntu-latest
            - name: Checkout Code
              uses: actions/checkout@v2
            - name: Run transform_data.py
              run: python transform_data.py

    load-data-job:
        runs-on: ubuntu-latest
            - name: Checkout Code
              uses: actions/checkout@v2
            - name: Run load_data.py
              run: python load_data.py